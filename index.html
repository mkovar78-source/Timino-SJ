<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Slovný Trenažér</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-title" content="Slovina">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #0f172a; color: #f8fafc; height: 100dvh; display: flex; justify-content: center; overflow: hidden; }
        
        .app-container { width: 100%; max-width: 450px; height: 100%; display: flex; flex-direction: column; padding: 4vh 5vw; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 0.95rem; color: #94a3b8; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .level-badge { background: rgba(255, 255, 255, 0.1); padding: 6px 14px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.15); color: #38bdf8; }
        
        .progress-bar-bg { width: 100%; height: 8px; background: #1e293b; border-radius: 4px; overflow: hidden; margin-bottom: 15px; }
        .progress-fill { height: 100%; background: #38bdf8; width: 0%; transition: width 0.4s ease; box-shadow: 0 0 10px rgba(56, 189, 248, 0.5); }
        
        .target-msg { text-align: center; font-size: 0.95rem; color: #f472b6; font-weight: bold; margin-bottom: 2vh; letter-spacing: 0.5px; }
        
        .sentence-box { flex-grow: 1; display: flex; align-items: center; justify-content: center; background: #1e293b; border-radius: 16px; padding: 20px 30px; box-shadow: inset 0 2px 10px rgba(0,0,0,0.2); margin-bottom: 2vh; }
        
        .sentence-content { font-size: 1.6rem; text-align: center; line-height: 1.5; }
        
        .highlight { color: #fde047; font-weight: 800; text-shadow: 0 0 12px rgba(253, 224, 71, 0.4); }
        
        .explanation { height: 60px; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 0.95rem; font-weight: 500; padding: 0 10px; margin-bottom: 2vh; }
        .instruction { text-align: center; color: #94a3b8; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        
        .controls { display: flex; flex-direction: column; gap: 12px; padding-bottom: 2vh; }
        button.option-btn { background: transparent; color: #f8fafc; border: 2px solid #334155; padding: 16px; border-radius: 12px; font-size: 1.1rem; font-weight: bold; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; }
        
        .btn-pre { border-color: #f43f5e !important; color: #f43f5e !important; }
        .btn-pri { border-color: #10b981 !important; color: #10b981 !important; }
        .btn-spo { border-color: #f59e0b !important; color: #f59e0b !important; }
        
        button.option-btn:active { background: rgba(255,255,255,0.05); transform: scale(0.98); }
        button.option-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        
        #win-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; flex-direction: column; align-items: center; justify-content: center; z-index: 100; padding: 20px; text-align: center; }
        .reward-code { font-size: 2.2rem; color: #10b981; letter-spacing: 4px; margin: 20px 0; background: rgba(16, 185, 129, 0.1); padding: 15px 25px; border-radius: 12px; border: 1px solid rgba(16, 185, 129, 0.3); }
        .reset-btn { background: #1e293b; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: bold; margin-top: 30px; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="win-screen">
        <h1 style="color: #f8fafc; font-size: 2rem; margin-bottom: 10px;">MISIA SPLNENÁ 🎁</h1>
        <p style="color: #94a3b8; font-size: 1.1rem;">Úspešne si odomkol prekvapenie!</p>
        <div class="reward-code">ŠAMPIÓN50</div>
        <p style="color: #94a3b8;">Odovzdaj tento kód ockovi pre uplatnenie odmeny.</p>
        <button class="reset-btn" onclick="resetGame()">Reštartovať misiu</button>
    </div>

    <div class="header">
        <div class="level-badge">LVL <span id="lvl">1</span></div>
        <div>SCORE: <span id="score" style="color: #f8fafc;">0</span></div>
    </div>

    <div class="progress-bar-bg"><div id="pb" class="progress-fill"></div></div>
    
    <div class="target-msg" id="target">Do odhalenia prekvapenia chýba: 50 bodov 🎁</div>

    <div class="sentence-box" id="q">
        <div class="sentence-content" id="sentence-text">Pripravujem otázku...</div>
    </div>
    
    <div class="explanation" id="exp"></div>
    <div class="instruction">Zvoľ správny slovný druh:</div>

    <div class="controls">
        <button id="btn-pre" class="option-btn btn-pre" onclick="check('predložka')">PREDLOŽKA</button>
        <button id="btn-pri" class="option-btn btn-pri" onclick="check('príslovka')">PRÍSLOVKA</button>
        <button id="btn-spo" class="option-btn btn-spo" onclick="check('spojka')">SPOJKA</button>
    </div>
</div>

<script>
    var explanations = {
        "predložka": "Predložky vyjadrujú vzťah k okoliu (miesto, čas). Stoja vždy pred iným slovom.",
        "príslovka": "Príslovky vyjadrujú okolnosť deja (pýtame sa Ako? Kedy? Kde? Prečo?).",
        "spojka": "Spojky (a, i, ale, lebo...) spájajú vety alebo vetné členy do celkov."
    };

    var data = [
        {veta: "Zariadenie funguje bez problémov.", slovo: "bez", odpoved: "predložka"},
        {veta: "Aplikácia sa spustila okamžite.", slovo: "okamžite", odpoved: "príslovka"},
        {veta: "Vyhral, hoci bol v oslabení.", slovo: "hoci", odpoved: "spojka"},
        {veta: "Mobil mám v batohu.", slovo: "v", odpoved: "predložka"},
        {veta: "Ovládač polož na stôl.", slovo: "na", odpoved: "predložka"},
        {veta: "Level prešiel celkom ľahko.", slovo: "ľahko", odpoved: "príslovka"},
        {veta: "Systém spadol, lebo stratil signál.", slovo: "lebo", odpoved: "spojka"},
        {veta: "Monitor je pred tebou.", slovo: "pred", odpoved: "predložka"},
        {veta: "Dnes to funguje perfektne.", slovo: "perfektne", odpoved: "príslovka"},
        {veta: "Klávesnica aj myš svietia.", slovo: "aj", odpoved: "spojka"},
        {veta: "Kábel schovaj pod stôl.", slovo: "pod", odpoved: "predložka"},
        {veta: "Hrám, aby som sa zlepšil.", slovo: "aby", odpoved: "spojka"},
        {veta: "Súper hral agresívne.", slovo: "agresívne", odpoved: "príslovka"},
        {veta: "Počkáme si do zajtra.", slovo: "do", odpoved: "predložka"},
        {veta: "Klikni na to, nech vieme výsledok.", slovo: "nech", odpoved: "spojka"}
    ];

    var score = 0;
    var currentQ = null;
    var GOAL = 50;

    try {
        var saved = localStorage.getItem('pro_score_v5');
        if (saved !== null) score = parseInt(saved) || 0;
    } catch(e) { score = 0; }

    function setButtonsDisabled(state) {
        document.getElementById('btn-pre').disabled = state;
        document.getElementById('btn-pri').disabled = state;
        document.getElementById('btn-spo').disabled = state;
    }

    function buildSentence(item) {
        // Rozdeliť vetu na časti podľa hľadaného slova a zvýrazniť ho
        var veta = item.veta;
        var slovo = item.slovo;
        var idx = veta.indexOf(slovo);
        if (idx === -1) return veta;
        var pred = veta.substring(0, idx);
        var po = veta.substring(idx + slovo.length);
        return pred + '<span class="highlight">' + slovo + '</span>' + po;
    }

    function update() {
        if (score >= GOAL) {
            document.getElementById('win-screen').style.display = 'flex';
            return;
        }

        currentQ = data[Math.floor(Math.random() * data.length)];

        var html = buildSentence(currentQ);
        document.getElementById('sentence-text').innerHTML = html;

        document.getElementById('lvl').innerText = Math.floor(score / 2) + 1;
        document.getElementById('score').innerText = score;
        document.getElementById('target').innerText = 'Do odhalenia prekvapenia chýba: ' + (GOAL - score) + ' bodov 🎁';
        document.getElementById('pb').style.width = (score / GOAL * 100) + '%';
        document.getElementById('exp').innerText = '';

        try { localStorage.setItem('pro_score_v5', score); } catch(e) {}

        setButtonsDisabled(false);
    }

    function check(ans) {
        if (!currentQ) return;
        var expEl = document.getElementById('exp');
        setButtonsDisabled(true);

        if (ans === currentQ.odpoved) {
            score += 1;
            expEl.style.color = '#10b981';
            expEl.innerText = 'SPRÁVNE: ' + explanations[ans];
        } else {
            expEl.style.color = '#f43f5e';
            expEl.innerText = 'CHYBA: ' + explanations[currentQ.odpoved];
        }

        setTimeout(function() { update(); }, 3000);
    }

    function resetGame() {
        score = 0;
        try { localStorage.clear(); } catch(e) {}
        document.getElementById('win-screen').style.display = 'none';
        update();
    }

    // Spustenie po načítaní stránky
    window.onload = function() { update(); };
</script>
</body>
</html>
